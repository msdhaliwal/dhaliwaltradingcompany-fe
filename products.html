<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products - DTC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
    }

    .sidebar {
      transition: transform 0.3s ease;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
    }

    th,
    td {
      transition: all 0.2s;
    }
  </style>
</head>

<body class="bg-gray-100 min-h-screen">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <div id="sidebar"
      class="sidebar w-64 bg-white border-r border-gray-200 flex-shrink-0 fixed md:static inset-y-0 left-0 z-50 transform -translate-x-full md:translate-x-0">
      <div class="p-6 border-b">
        <h2 class="text-3xl font-bold text-gray-900">DTC</h2>
      </div>

      <nav class="p-4 space-y-1">
        <a href="./dashboard.html"
          class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-home"></i>
          <span>Dashboard</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-2xl font-medium">
          <i class="fas fa-box"></i>
          <span>Products</span>
        </a>
        <a href="./orders.html" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-shopping-cart"></i>
          <span>Orders</span>
        </a>
        <a href="./parties.html" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-users"></i>
          <span>Parties</span>
        </a>
        <a href="./analytics.html"
          class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-chart-bar"></i>
          <span>Analytics</span>
        </a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- Top Bar -->
      <div class="bg-white border-b px-4 py-4 md:px-8 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button id="menuBtn" class="md:hidden p-2 text-gray-700 hover:bg-gray-100 rounded-xl">
            <i class="fas fa-bars text-2xl"></i>
          </button>
          <h1 class="text-2xl md:text-3xl font-bold text-gray-900">
            Products
          </h1>
        </div>

        <div class="flex items-center gap-3">
          <div class="hidden sm:block text-right">
            <p class="text-sm text-gray-500">Welcome back,</p>
            <p class="font-semibold text-gray-900">Manpreet</p>
          </div>
          <div
            class="w-9 h-9 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-bold text-lg shadow">
            M
          </div>
        </div>
      </div>

      <!-- Content Area -->
      <div class="flex-1 p-4 md:p-8 overflow-auto">
        <!-- Header with Add Button -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
          <div>
            <p class="text-gray-500">Manage your inventory</p>
          </div>
          <button onclick="showAddProductModal()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2 font-medium shadow-sm">
            <i class="fas fa-plus"></i>
            Add New Product
          </button>
        </div>

        <!-- Products Table -->
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full min-w-full">
              <thead>
                <tr class="bg-gray-50 border-b">
                  <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                    Select
                  </th>
                  <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                    Product Name
                  </th>
                  <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                    HSN Code
                  </th>
                  <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                    SKU
                  </th>

                  <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                    CGST %
                  </th>
                  <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                    SGST %
                  </th>
                  <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                    Created By
                  </th>
                  <th class="px-6 py-4 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">
                    Actions
                  </th>
                </tr>
              </thead>
              <tbody id="productTableBody" class="divide-y divide-gray-200 text-sm">
                <!-- Rows will be added by JavaScript -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Product Modal -->
  <div id="productModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl w-full max-w-lg mx-4 shadow-2xl">
      <div class="px-8 pt-8 pb-6">
        <h2 id="modalTitle" class="text-2xl font-bold text-gray-900">
          Add New Product
        </h2>
      </div>

      <div class="px-8 space-y-6">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">HSN Code</label>
            <input id="hsn" type="text"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">SKU</label>
            <input id="sku" type="text"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
          <input id="name" type="text"
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">CGST (%)</label>
            <input id="cgst" type="number" step="0.01" value="9"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">SGST (%)</label>
            <input id="sgst" type="number" step="0.01" value="9"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
        </div>
      </div>

      <div class="p-8 flex gap-3 pt-10 border-t mt-8">
        <button onclick="hideModal()"
          class="flex-1 py-3.5 text-gray-700 font-medium border border-gray-300 rounded-2xl hover:bg-gray-50">
          Cancel
        </button>
        <button onclick="saveProduct()" id="saveBtn"
          class="flex-1 py-3.5 bg-blue-600 text-white font-medium rounded-2xl hover:bg-blue-700">
          Add Product
        </button>
      </div>
    </div>
  </div>

  <script>
    let products = [];

    let editingId = null;

    function renderProducts() {
      const tbody = document.getElementById('productTableBody');
      tbody.innerHTML = '';

      products.forEach((product) => {
        const row = document.createElement('tr');
        row.className = `hover:bg-gray-50 ${!product.active ? 'opacity-60' : ''}`;
        row.innerHTML = `
          <td class="px-6 py-5">
            <input type="checkbox" ${product.active ? 'checked' : ''} onchange="toggleProductStatus(${product.id}, this.checked)" class="w-4 h-4 text-blue-600 rounded border-gray-300">
          </td>
          <td class="px-6 py-5 font-medium">${product.name}</td>
          <td class="px-6 py-5 font-mono text-gray-600">${product.hsn}</td>
          <td class="px-6 py-5 font-mono text-gray-600">${product.sku}</td>
          <td class="px-6 py-5">${product.cgst}%</td>
          <td class="px-6 py-5">${product.sgst}%</td>
          <td class="px-6 py-5 text-gray-600">${product.createdBy}</td>
          <td class="px-6 py-5 text-center">
            <button onclick="editProduct(${product.id})" 
                    class="text-blue-600 hover:text-blue-700 px-3 py-1 rounded-xl hover:bg-blue-50">
              <i class="fas fa-edit"></i>
            </button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function showAddProductModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add New Product';
      document.getElementById('saveBtn').textContent = 'Add Product';

      document.getElementById('hsn').value = '';
      document.getElementById('sku').value = '';
      document.getElementById('name').value = '';
      document.getElementById('cgst').value = '9';
      document.getElementById('sgst').value = '9';

      document.getElementById('productModal').classList.remove('hidden');
      document.getElementById('productModal').classList.add('flex');
    }

    function hideModal() {
      const modal = document.getElementById('productModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function saveProduct() {
      const hsn = document.getElementById('hsn').value.trim();
      const sku = document.getElementById('sku').value.trim();
      const name = document.getElementById('name').value.trim();
      // const stock = parseInt(document.getElementById('stock').value) || 0;
      const cgst = parseFloat(document.getElementById('cgst').value) || 0;
      const sgst = parseFloat(document.getElementById('sgst').value) || 0;
      // const createdBy = document.getElementById('createdBy').value.trim() || 'Manpreet';

      if (!name || !sku) {
        alert('Product Name and SKU are required!');
        return;
      }

      if (editingId) {
        // Update existing product
        const product = products.find((p) => p.id === editingId);
        if (product) {
          product.hsn = hsn;
          product.sku = sku;
          product.name = name;
          product.stock = stock;
          product.cgst = cgst;
          product.sgst = sgst;
          product.createdBy = createdBy;
        }
      } else {
        // Add new product
        const newProduct = {
          id: Date.now(),
          hsn,
          sku,
          name,
          stock,
          cgst,
          sgst,
          createdBy,
          active: true,
        };
        products.unshift(newProduct);
      }

      hideModal();
      renderProducts();
    }

    function editProduct(id) {
      const product = products.find((p) => p.id === id);
      if (!product) return;

      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit Product';
      document.getElementById('saveBtn').textContent = 'Save Changes';

      document.getElementById('hsn').value = product.hsn;
      document.getElementById('sku').value = product.sku;
      document.getElementById('name').value = product.name;
      document.getElementById('stock').value = product.stock;
      document.getElementById('cgst').value = product.cgst;
      document.getElementById('sgst').value = product.sgst;
      document.getElementById('createdBy').value = product.createdBy;

      document.getElementById('productModal').classList.remove('hidden');
      document.getElementById('productModal').classList.add('flex');
    }

    function toggleProductStatus(id, isActive) {
      const product = products.find((p) => p.id === id);
      if (product) {
        product.active = isActive;
        renderProducts();
      }
    }

    // Mobile Sidebar Controls
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.createElement('div');
    overlay.id = 'overlay';
    overlay.className = 'fixed inset-0 bg-black/50 hidden md:hidden z-40';
    document.body.appendChild(overlay);

    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
    }

    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
    }

    menuBtn.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    // Initial Render
    renderProducts();
  </script>
</body>

</html>
