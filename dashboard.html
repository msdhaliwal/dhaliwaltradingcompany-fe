<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - DTC</title>
  <script src="./assets/js/tailwind.js"></script>
  <link rel="stylesheet" href="./assets/css/font-awesome.min.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    .sidebar {
      transition: transform 0.3s ease;
    }
  </style>
</head>

<body class="bg-gray-100 min-h-screen">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar (Desktop: fixed, Mobile: slide-in) -->
    <div id="sidebar"
      class="sidebar w-64 bg-white border-r border-gray-200 flex-shrink-0 fixed md:static inset-y-0 left-0 z-50  transform -translate-x-full md:translate-x-0">

      <!-- Sidebar Header -->
      <div class="p-6 border-b">
        <h2 class="text-3xl font-bold text-gray-900">DTC</h2>
      </div>

      <!-- Navigation -->
      <nav class="p-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-2xl font-medium">
          <i class="fas fa-home"></i>
          <span>Dashboard</span>
        </a>
        <a href="./products.html" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-box"></i>
          <span>Products</span>
        </a>
        <a href="./orders.html" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-shopping-cart"></i>
          <span>Orders</span>
        </a>
        <a href="./parties.html" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-users"></i>
          <span>Parties</span>
        </a>
        <a href="./analytics.html"
          class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-chart-bar"></i>
          <span>Analytics</span>
        </a>
      </nav>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col min-w-0">

      <!-- Top Bar -->
      <div class="bg-white border-b px-4 py-4 md:px-8 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <!-- Mobile Menu Button -->
          <button id="menuBtn" class="md:hidden p-2 text-gray-700 hover:bg-gray-100 rounded-xl">
            <i class="fas fa-bars text-2xl"></i>
          </button>
          <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Dashboard</h1>
        </div>

        <!-- Welcome -->
        <div class="flex items-center gap-3">
          <div class="hidden sm:block text-right">
            <p class="text-sm text-gray-500">Welcome back,</p>
            <p class="font-semibold text-gray-900">Manpreet</p>
          </div>
          <div
            class="w-9 h-9 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-bold text-lg shadow">
            M
          </div>
        </div>
      </div>

      <!-- Dashboard Content -->
      <div class="flex-1 p-4 md:p-8 overflow-auto">

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6">

          <!-- Total Products -->
          <div class="bg-white rounded-3xl p-6 card shadow-sm">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-gray-500 text-sm">Total Products</p>
                <p id="products_widget" class="text-4xl font-bold text-gray-900 mt-3">0</p>
              </div>
              <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center">
                <i class="fas fa-box text-3xl text-blue-600"></i>
              </div>
            </div>
          </div>

          <!-- In Stock -->
          <div class="bg-white rounded-3xl p-6 card shadow-sm">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-gray-500 text-sm">In Stock</p>
                <p class="text-4xl font-bold text-green-600 mt-3">0</p>
              </div>
              <div class="w-12 h-12 bg-green-100 rounded-2xl flex items-center justify-center">
                <i class="fas fa-check-circle text-3xl text-green-600"></i>
              </div>
            </div>
          </div>

          <!-- Low Stock -->
          <div class="bg-white rounded-3xl p-6 card shadow-sm">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-gray-500 text-sm">Low Stock</p>
                <p class="text-4xl font-bold text-orange-600 mt-3">0</p>
              </div>
              <div class="w-12 h-12 bg-orange-100 rounded-2xl flex items-center justify-center">
                <i class="fas fa-exclamation-triangle text-3xl text-orange-600"></i>
              </div>
            </div>
          </div>

          <!-- Out of Stock -->
          <div class="bg-white rounded-3xl p-6 card shadow-sm">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-gray-500 text-sm">Out of Stock</p>
                <p class="text-4xl font-bold text-red-600 mt-3">0</p>
              </div>
              <div class="w-12 h-12 bg-red-100 rounded-2xl flex items-center justify-center">
                <i class="fas fa-times-circle text-3xl text-red-600"></i>
              </div>
            </div>
          </div>

          <!-- Orders Today -->
          <div class="bg-white rounded-3xl p-6 card shadow-sm">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-gray-500 text-sm">Orders Today</p>
                <p class="text-4xl font-bold text-gray-900 mt-3">0</p>
              </div>
              <div class="w-12 h-12 bg-purple-100 rounded-2xl flex items-center justify-center">
                <i class="fas fa-shopping-bag text-3xl text-purple-600"></i>
              </div>
            </div>
          </div>

          <!-- Orders This Month -->
          <div class="bg-white rounded-3xl p-6 card shadow-sm">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-gray-500 text-sm">Orders This Month</p>
                <p class="text-4xl font-bold text-gray-900 mt-3">0</p>
              </div>
              <div class="w-12 h-12 bg-indigo-100 rounded-2xl flex items-center justify-center">
                <i class="fas fa-calendar-alt text-3xl text-indigo-600"></i>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>

  <!-- Mobile Overlay -->
  <div id="overlay" class="fixed inset-0 bg-black/50 hidden md:hidden z-40"></div>

  <script src="./assets/js/common.js"></script>
  <script src="./assets/js/dashboard.js"></script>
</body>

</html>
