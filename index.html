<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login - DTC</title>
	<script>
		window.addEventListener('load', function () {
			const login_token = localStorage.getItem('login_token');
			if (login_token) {
				window.location.href = 'dashboard.html';
			}
		});
	</script>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		body {
			font-family: 'Segoe UI', system-ui, sans-serif;
			background-color: #09090b;
		}

		.login-container {
			max-width: 420px;
			margin: 40px auto;
			padding: 2rem;
		}

		@media (max-width: 480px) {
			.login-container {
				margin: 20px 1rem;
				padding: 1.5rem;
			}
		}
	</style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center">
	<div class="login-container bg-white rounded-2xl shadow-xl p-8 md:p-10">
		<!-- Logo/Header -->
		<div class="text-center mb-8">
			<h1 class="text-3xl font-bold text-gray-900">Welcome Back</h1>
			<p class="text-gray-600 mt-2">Sign in to continue</p>
		</div>

		<!-- Login Form -->
		<form id="loginForm" class="space-y-6">
			<!-- Email Field -->
			<div>
				<label class="block text-sm font-medium text-gray-700 mb-2">
					Email Address
				</label>
				<input type="email" id="email" required
					class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
					placeholder="you@example.com" />
			</div>

			<!-- Password Field -->
			<div>
				<label class="block text-sm font-medium text-gray-700 mb-2">
					Password
				</label>
				<input type="password" id="password" required
					class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
					placeholder="••••••••" />
			</div>
			<!-- Login Button -->
			<button type="submit"
				class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl transition-all duration-200 flex items-center justify-center gap-2">
				Sign In
			</button>
		</form>
	</div>
	<script src="./assets/js/login.js"> </script>
</body>

</html>
