<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balance Ledger - DTC</title>
  <script src="./assets/js/tailwind.js"></script>
  <link rel="stylesheet" href="./assets/css/font-awesome.min.css">

  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .sidebar {
      transition: transform 0.3s ease;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
    }
  </style>
</head>

<body class="bg-gray-100 min-h-screen">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <div id="sidebar"
      class="sidebar w-64 bg-white border-r border-gray-200 flex-shrink-0 fixed md:static inset-y-0 left-0 z-50 transform -translate-x-full md:translate-x-0">

      <div class="p-6 border-b">
        <h2 class="text-3xl font-bold text-gray-900">MyStore</h2>
      </div>

      <nav class="p-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-home"></i>
          <span>Dashboard</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-box"></i>
          <span>Products</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-users"></i>
          <span>Parties</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-2xl font-medium">
          <i class="fas fa-book"></i>
          <span>Balance Ledger</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-shopping-cart"></i>
          <span>Orders</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-chart-bar"></i>
          <span>Analytics</span>
        </a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0">

      <!-- Top Bar -->
      <div class="bg-white border-b px-4 py-4 md:px-8 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button id="menuBtn" class="md:hidden p-2 text-gray-700 hover:bg-gray-100 rounded-xl">
            <i class="fas fa-bars text-2xl"></i>
          </button>
          <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Balance Ledger</h1>
        </div>

        <div class="flex items-center gap-3">
          <div class="hidden sm:block text-right">
            <p class="text-sm text-gray-500">Welcome back,</p>
            <p class="font-semibold text-gray-900">Manpreet</p>
          </div>
          <div
            class="w-9 h-9 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-bold text-lg shadow">
            M
          </div>
        </div>
      </div>

      <!-- Content Area -->
      <div class="flex-1 p-4 md:p-8 overflow-auto">

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="bg-white rounded-3xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">Total Balance</p>
            <p class="text-4xl font-bold text-green-600 mt-3" id="totalBalance">₹1,24,850</p>
          </div>
          <div class="bg-white rounded-3xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">Total Credit</p>
            <p class="text-4xl font-bold text-blue-600 mt-3" id="totalCredit">₹2,85,400</p>
          </div>
          <div class="bg-white rounded-3xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">Total Debit</p>
            <p class="text-4xl font-bold text-red-600 mt-3" id="totalDebit">₹1,60,550</p>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap gap-4 mb-6">
          <button onclick="showAddEntryModal('Credit')"
            class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2 font-medium">
            <i class="fas fa-plus"></i>
            Add Credit Entry
          </button>
          <button onclick="showAddEntryModal('Debit')"
            class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2 font-medium">
            <i class="fas fa-minus"></i>
            Add Debit Entry
          </button>
        </div>

        <!-- Ledger Table -->
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="bg-gray-50 border-b">
                  <th class="px-6 py-5 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                  <th class="px-6 py-5 text-left text-xs font-medium text-gray-500 uppercase">Particulars</th>
                  <th class="px-6 py-5 text-left text-xs font-medium text-gray-500 uppercase">Reference</th>
                  <th class="px-6 py-5 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                  <th class="px-6 py-5 text-right text-xs font-medium text-gray-500 uppercase">Credit (₹)</th>
                  <th class="px-6 py-5 text-right text-xs font-medium text-gray-500 uppercase">Debit (₹)</th>
                  <th class="px-6 py-5 text-right text-xs font-medium text-gray-500 uppercase">Balance (₹)</th>
                </tr>
              </thead>
              <tbody id="ledgerTableBody" class="divide-y divide-gray-200 text-sm">
                <!-- Populated by JavaScript -->
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Add Entry Modal -->
  <div id="entryModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl w-full max-w-md mx-4 shadow-2xl">
      <div class="px-8 pt-8 pb-6">
        <h2 id="modalTitle" class="text-2xl font-bold text-gray-900">Add New Entry</h2>
      </div>

      <div class="px-8 space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
          <input id="entryDate" type="date" class="w-full px-4 py-3 border border-gray-300 rounded-2xl">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Particulars / Description</label>
          <input id="particulars" type="text" placeholder="e.g. Payment from Rahul Sharma"
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Reference (Optional)</label>
          <input id="reference" type="text" placeholder="e.g. Order #ORD123 or Invoice #INV456"
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
            <select id="entryType" onchange="updateModalTitle()"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="Credit">Credit</option>
              <option value="Debit">Debit</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Amount (₹)</label>
            <input id="amount" type="number" step="0.01" placeholder="0.00"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
      </div>

      <div class="p-8 flex gap-3 pt-10 border-t mt-8">
        <button onclick="hideModal()"
          class="flex-1 py-3.5 text-gray-700 font-medium border border-gray-300 rounded-2xl hover:bg-gray-50">
          Cancel
        </button>
        <button onclick="saveEntry()"
          class="flex-1 py-3.5 bg-blue-600 text-white font-medium rounded-2xl hover:bg-blue-700">
          Save Entry
        </button>
      </div>
    </div>
  </div>
  <!-- Mobile Overlay -->
  <div id="overlay" class="fixed inset-0 bg-black/50 hidden md:hidden z-40"></div>

  <script src="./assets/js/common.js"></script>
  <script>
    let ledgerEntries = [];

    let currentBalance = 40500;

    function calculateBalances() {
      let runningBalance = 0;
      ledgerEntries.forEach(entry => {
        if (entry.type === "Credit") {
          runningBalance += entry.amount;
        } else {
          runningBalance -= entry.amount;
        }
        entry.balance = runningBalance;
      });
      currentBalance = runningBalance;
    }

    function renderLedger() {
      calculateBalances();

      document.getElementById('totalBalance').textContent = `₹${currentBalance.toLocaleString('en-IN')}`;
      document.getElementById('totalCredit').textContent = `₹${ledgerEntries.filter(e => e.type === 'Credit').reduce((sum, e) => sum + e.amount, 0).toLocaleString('en-IN')}`;
      document.getElementById('totalDebit').textContent = `₹${ledgerEntries.filter(e => e.type === 'Debit').reduce((sum, e) => sum + e.amount, 0).toLocaleString('en-IN')}`;

      const tbody = document.getElementById('ledgerTableBody');
      tbody.innerHTML = '';

      ledgerEntries.slice().reverse().forEach(entry => {
        const row = document.createElement('tr');
        row.className = "hover:bg-gray-50";
        row.innerHTML = `
          <td class="px-6 py-5 whitespace-nowrap">${entry.date}</td>
          <td class="px-6 py-5">${entry.particulars}</td>
          <td class="px-6 py-5 text-gray-500 font-mono">${entry.reference || '-'}</td>
          <td class="px-6 py-5">
            <span class="inline-flex px-4 py-1 rounded-full text-xs font-medium
                         ${entry.type === 'Credit' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
              ${entry.type}
            </span>
          </td>
          <td class="px-6 py-5 text-right font-medium ${entry.type === 'Credit' ? 'text-green-600' : 'text-gray-400'}">
            ${entry.type === 'Credit' ? '₹' + entry.amount.toLocaleString('en-IN') : '-'}
          </td>
          <td class="px-6 py-5 text-right font-medium ${entry.type === 'Debit' ? 'text-red-600' : 'text-gray-400'}">
            ${entry.type === 'Debit' ? '₹' + entry.amount.toLocaleString('en-IN') : '-'}
          </td>
          <td class="px-6 py-5 text-right font-semibold ${entry.balance >= 0 ? 'text-green-600' : 'text-red-600'}">
            ₹${entry.balance.toLocaleString('en-IN')}
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function showAddEntryModal(type = 'Credit') {
      document.getElementById('entryType').value = type;
      document.getElementById('modalTitle').textContent = `Add ${type} Entry`;

      document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('particulars').value = '';
      document.getElementById('reference').value = '';
      document.getElementById('amount').value = '';

      document.getElementById('entryModal').classList.remove('hidden');
      document.getElementById('entryModal').classList.add('flex');
    }

    function updateModalTitle() {
      const type = document.getElementById('entryType').value;
      document.getElementById('modalTitle').textContent = `Add ${type} Entry`;
    }

    function hideModal() {
      const modal = document.getElementById('entryModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function saveEntry() {
      const date = document.getElementById('entryDate').value;
      const particulars = document.getElementById('particulars').value.trim();
      const reference = document.getElementById('reference').value.trim();
      const type = document.getElementById('entryType').value;
      const amount = parseFloat(document.getElementById('amount').value);

      if (!date || !particulars || !amount) {
        alert("Date, Particulars and Amount are required!");
        return;
      }

      const newEntry = {
        id: Date.now(),
        date,
        particulars,
        reference,
        type,
        amount,
        balance: 0
      };

      ledgerEntries.push(newEntry);
      hideModal();
      renderLedger();
    }
    // Initialize Page
    renderLedger();
  </script>

</body>

</html>
