<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parties - DTC</title>
  <script src="./assets/js/tailwind.js"></script>
  <link rel="stylesheet" href="./assets/css/font-awesome.min.css">

  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
    }

    .sidebar {
      transition: transform 0.3s ease;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
    }
  </style>
</head>

<body class="bg-gray-100 min-h-screen">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <div id="sidebar"
      class="sidebar w-64 bg-white border-r border-gray-200 flex-shrink-0 fixed md:static inset-y-0 left-0 z-50 transform -translate-x-full md:translate-x-0">

      <div class="p-6 border-b">
        <h2 class="text-3xl font-bold text-gray-900">DTC</h2>
      </div>

      <nav class="p-4 space-y-1">
        <a href="./dashboard.html"
          class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-home"></i>
          <span>Dashboard</span>
        </a>
        <a href="./products.html" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-box"></i>
          <span>Products</span>
        </a>
        <a href="./orders.html" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-shopping-cart"></i>
          <span>Orders</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-2xl font-medium">
          <i class="fas fa-users"></i>
          <span>Parties</span>
        </a>
        <a href="./analytics.html"
          class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-chart-bar"></i>
          <span>Analytics</span>
        </a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0">

      <!-- Top Bar -->
      <div class="bg-white border-b px-4 py-4 md:px-8 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button id="menuBtn" class="md:hidden p-2 text-gray-700 hover:bg-gray-100 rounded-xl">
            <i class="fas fa-bars text-2xl"></i>
          </button>
          <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Parties</h1>
        </div>

        <div class="flex items-center gap-3">
          <div class="hidden sm:block text-right">
            <p class="text-sm text-gray-500">Welcome back,</p>
            <p class="font-semibold text-gray-900">Manpreet</p>
          </div>
          <div
            class="w-9 h-9 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-bold text-lg shadow">
            M
          </div>
        </div>
      </div>

      <!-- Content Area -->
      <div class="flex-1 p-4 md:p-8 overflow-auto">

        <!-- Tabs: Customers | Suppliers -->
        <div class="flex border-b mb-6">
          <button onclick="switchTab(0)" id="tab0"
            class="tab-button px-8 py-4 font-medium border-b-2 border-blue-600 text-blue-600">
            All Parties
          </button>
          <button onclick="switchTab(1)" id="tab1"
            class="tab-button px-8 py-4 font-medium text-gray-500 hover:text-gray-700">
            Customers
          </button>
          <button onclick="switchTab(2)" id="tab2"
            class="tab-button px-8 py-4 font-medium text-gray-500 hover:text-gray-700">
            Suppliers
          </button>
        </div>

        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
          <div class="flex-1">
            <input id="searchInput" onkeyup="filterParties()" type="text"
              placeholder="Search by name, phone, email or GSTIN..."
              class="w-full max-w-md px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <button onclick="showAddPartyModal()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2 font-medium shadow-sm">
            <i class="fas fa-plus"></i>
            Add New Party
          </button>
        </div>

        <!-- Parties Table -->
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="bg-gray-50 border-b">
                  <th class="px-6 py-5 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                  <th class="px-6 py-5 text-left text-xs font-medium text-gray-500 uppercase">Phone</th>
                  <th class="px-6 py-5 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                  <th class="px-6 py-5 text-left text-xs font-medium text-gray-500 uppercase">GSTIN</th>
                  <th class="px-6 py-5 text-left text-xs font-medium text-gray-500 uppercase">State Code</th>
                  <th class="px-6 py-5 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                  <th class="px-6 py-5 text-center text-xs font-medium text-gray-500 uppercase">Actions</th>
                </tr>
              </thead>
              <tbody id="partyTableBody" class="divide-y divide-gray-200 text-sm">
                <!-- Populated by JavaScript -->
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Add/Edit Party Modal -->
  <div id="partyModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl w-full max-w-lg mx-4 shadow-2xl">
      <div class="px-8 pt-8 pb-6">
        <h2 id="modalTitle" class="text-2xl font-bold text-gray-900">Add New Party</h2>
      </div>

      <div class="px-8 space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Party Name <span
              class="text-red-500">*</span></label>
          <input id="name" type="text"
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number <span
                class="text-red-500">*</span></label>
            <input id="phone" type="tel"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input id="email" type="email"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">GSTIN</label>
          <input id="gstin" type="text" maxlength="15"
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">State Code</label>
            <input id="stateCode" type="text" maxlength="2"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Party Type</label>
            <select id="partyType"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="Customer">Customer</option>
              <option value="Supplier">Supplier</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
          <textarea id="address" rows="3"
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
      </div>

      <div class="p-8 flex gap-3 pt-10 border-t mt-8">
        <button onclick="hideModal()"
          class="flex-1 py-3.5 text-gray-700 font-medium border border-gray-300 rounded-2xl hover:bg-gray-50">
          Cancel
        </button>
        <button onclick="saveParty()" id="saveBtn"
          class="flex-1 py-3.5 bg-blue-600 text-white font-medium rounded-2xl hover:bg-blue-700">
          Add Party
        </button>
      </div>
    </div>
  </div>
  <!-- Mobile Overlay -->
  <div id="overlay" class="fixed inset-0 bg-black/50 hidden md:hidden z-40"></div>

  <script src="./assets/js/common.js"></script>
  <script>
    let parties = []

    let editingId = null;
    let currentTab = 0; // 0 = All, 1 = Customers, 2 = Suppliers

    function renderParties(filteredParties = parties) {
      const tbody = document.getElementById('partyTableBody');
      tbody.innerHTML = '';

      filteredParties.forEach(party => {
        const row = document.createElement('tr');
        row.className = "hover:bg-gray-50";
        row.innerHTML = `
          <td class="px-6 py-5 font-medium">${party.name}</td>
          <td class="px-6 py-5 text-gray-600">${party.phone}</td>
          <td class="px-6 py-5 text-gray-600">${party.email || '-'}</td>
          <td class="px-6 py-5 font-mono text-gray-600">${party.gstin || '-'}</td>
          <td class="px-6 py-5 text-center">${party.stateCode}</td>
          <td class="px-6 py-5">
            <span class="inline-flex px-4 py-1 rounded-full text-xs font-medium
                         ${party.type === 'Customer' ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700'}">
              ${party.type}
            </span>
          </td>
          <td class="px-6 py-5 text-center">
            <button onclick="editParty(${party.id})" 
                    class="text-blue-600 hover:text-blue-700 px-3 py-1 rounded-xl hover:bg-blue-50">
              <i class="fas fa-edit"></i>
            </button>
          </td>
        `;
        tbody.appendChild(row);
      });

      if (filteredParties.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500">No parties found</td></tr>`;
      }
    }

    function switchTab(tab) {
      currentTab = tab;

      // Update active tab styles
      document.querySelectorAll('.tab-button').forEach((btn, index) => {
        if (index === tab) {
          btn.classList.add('border-b-2', 'border-blue-600', 'text-blue-600');
          btn.classList.remove('text-gray-500');
        } else {
          btn.classList.remove('border-b-2', 'border-blue-600', 'text-blue-600');
          btn.classList.add('text-gray-500');
        }
      });

      filterParties();
    }

    function filterParties() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

      let filtered = parties;

      // Filter by tab
      if (currentTab === 1) {
        filtered = filtered.filter(p => p.type === "Customer");
      } else if (currentTab === 2) {
        filtered = filtered.filter(p => p.type === "Supplier");
      }

      // Filter by search
      if (searchTerm) {
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(searchTerm) ||
          (p.phone && p.phone.includes(searchTerm)) ||
          (p.email && p.email.toLowerCase().includes(searchTerm)) ||
          (p.gstin && p.gstin.toLowerCase().includes(searchTerm))
        );
      }

      renderParties(filtered);
    }

    function showAddPartyModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = "Add New Party";
      document.getElementById('saveBtn').textContent = "Add Party";

      document.getElementById('name').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('email').value = '';
      document.getElementById('gstin').value = '';
      document.getElementById('stateCode').value = '';
      document.getElementById('partyType').value = 'Customer';
      document.getElementById('address').value = '';

      document.getElementById('partyModal').classList.remove('hidden');
      document.getElementById('partyModal').classList.add('flex');
    }

    function hideModal() {
      const modal = document.getElementById('partyModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function saveParty() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const gstin = document.getElementById('gstin').value.trim();
      const stateCode = document.getElementById('stateCode').value.trim();
      const type = document.getElementById('partyType').value;
      const address = document.getElementById('address').value.trim();

      if (!name || !phone) {
        alert("Name and Phone Number are required!");
        return;
      }

      if (editingId) {
        const party = parties.find(p => p.id === editingId);
        if (party) {
          party.name = name;
          party.phone = phone;
          party.email = email;
          party.gstin = gstin;
          party.stateCode = stateCode;
          party.type = type;
          party.address = address;
        }
      } else {
        const newParty = {
          id: Date.now(),
          name,
          phone,
          email,
          gstin,
          stateCode,
          type,
          address
        };
        parties.unshift(newParty);
      }

      hideModal();
      filterParties();
    }

    function editParty(id) {
      const party = parties.find(p => p.id === id);
      if (!party) return;

      editingId = id;
      document.getElementById('modalTitle').textContent = "Edit Party";
      document.getElementById('saveBtn').textContent = "Save Changes";

      document.getElementById('name').value = party.name;
      document.getElementById('phone').value = party.phone;
      document.getElementById('email').value = party.email || '';
      document.getElementById('gstin').value = party.gstin || '';
      document.getElementById('stateCode').value = party.stateCode || '';
      document.getElementById('partyType').value = party.type;
      document.getElementById('address').value = party.address || '';

      document.getElementById('partyModal').classList.remove('hidden');
      document.getElementById('partyModal').classList.add('flex');
    }
    // Initialize
    renderParties();
  </script>

</body>

</html>
